<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: system-ui, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
  h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  p { font-size: 14px; color: #666; margin-bottom: 20px; }
  .grid3 { display: flex; gap: 12px; margin-bottom: 16px; }
  .grid6 { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
  .card {
    flex: 1; min-width: 120px;
    border: 1px solid #ddd; border-radius: 12px;
    padding: 16px 10px; text-align: center;
    cursor: pointer; background: #fff;
  }
  .card:hover { background: #f5f5f0; }
  .icon { font-size: 28px; margin-bottom: 6px; }
  .name { font-size: 14px; font-weight: 600; }
  .desc { font-size: 12px; color: #888; margin-top: 3px; }
  .hidden { display: none; }
  .progress { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 16px; }
  .bar { height: 4px; border-radius: 2px; background: #3b82f6; transition: width 0.3s; }
  .question { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  .opt {
    display: block; width: 100%; text-align: left;
    border: 1px solid #ddd; border-radius: 8px;
    padding: 11px 14px; margin-bottom: 8px;
    font-size: 14px; cursor: pointer; background: #fff;
  }
  .opt:hover:not(:disabled) { background: #f5f5f0; }
  .opt.correct { background: #eaf3de; border-color: #639922; color: #27500a; font-weight: 600; }
  .opt.wrong { background: #feecec; border-color: #e24b4a; color: #791f1f; }
  .feedback { font-size: 13px; color: #555; margin: 8px 0 12px; min-height: 18px; }
  .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .score-tag { font-size: 13px; font-weight: 600; background: #f1f0e8; padding: 4px 12px; border-radius: 20px; }
  .btn { border: 1px solid #ccc; background: transparent; border-radius: 8px; padding: 9px 20px; font-size: 14px; cursor: pointer; margin-right: 8px; }
  .btn:hover { background: #f5f5f0; }
  .big { font-size: 52px; font-weight: 700; color: #3b82f6; margin: 12px 0; }
  .back { font-size: 13px; color: #888; background: none; border: none; cursor: pointer; padding: 0; margin-top: 8px; }
</style>
</head>
<body>

<!-- SCREEN 1: Language -->
<div id="s-lang">
  <h2>Choose your language</h2>
  <p>All questions will appear in your chosen language</p>
  <div class="grid3">
    <div class="card" onclick="pickLang('en')"><div class="icon">🇬🇧</div><div class="name">English</div></div>
    <div class="card" onclick="pickLang('zh')"><div class="icon">🇨🇳</div><div class="name">中文</div></div>
    <div class="card" onclick="pickLang('es')"><div class="icon">🇪🇸</div><div class="name">Español</div></div>
  </div>
</div>

<!-- SCREEN 2: Genre -->
<div id="s-genre" class="hidden">
  <h2 id="g-title"></h2>
  <p id="g-sub"></p>
  <div class="grid6" id="genre-grid"></div>
  <button class="back" onclick="goTo('s-lang')" id="back-lang-btn"></button>
</div>

<!-- SCREEN 3: Quiz -->
<div id="s-quiz" class="hidden">
  <div class="row">
    <span class="badge" id="q-badge"></span>
    <span class="score-tag" id="q-score"></span>
  </div>
  <div class="progress"><div class="bar" id="q-bar" style="width:0%"></div></div>
  <p id="q-num" style="font-size:12px;color:#888;margin-bottom:8px;"></p>
  <div class="question" id="q-text"></div>
  <div id="q-opts"></div>
  <div class="feedback" id="q-exp"></div>
  <button class="btn hidden" id="q-next" onclick="nextQ()"></button>
</div>

<!-- SCREEN 4: Result -->
<div id="s-result" class="hidden" style="text-align:center;padding:20px 0">
  <span class="badge" id="r-badge"></span>
  <div class="big" id="r-score"></div>
  <p id="r-msg"></p>
  <button class="btn" id="r-again" onclick="playAgain()"></button>
  <button class="btn" id="r-genre" onclick="goGenre()"></button>
  <button class="btn" id="r-lang" onclick="goTo('s-lang')"></button>
</div>

var langKey='en', genre=null, qs=[], cur=0, score=0, answered=false;

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function goTo(id){
  var ids=['s-lang','s-genre','s-quiz','s-result'];
  for(var i=0;i<ids.length;i++){
    document.getElementById(ids[i]).style.display = ids[i]===id ? 'block' : 'none';
  }
}

function pickLang(l){
  langKey=l;
  var L=T[l];
  document.getElementById('g-title').textContent=L.gTitle;
  document.getElementById('g-sub').textContent=L.gSub;
  document.getElementById('back-lang-btn').textContent=L.backLang;
  var grid=document.getElementById('genre-grid');
  grid.innerHTML='';
  L.genres.forEach(function(g){
    var d=document.createElement('div');
    d.className='card';
    d.style.minWidth='120px';
    d.innerHTML='<div class="icon">'+g.icon+'</div><div class="name">'+g.name+'</div><div class="desc">'+g.desc+'</div>';
    d.onclick=(function(gg){return function(){startQuiz(gg);};})(g);
    grid.appendChild(d);
  });
  goTo('s-genre');
}

function startQuiz(g){
  genre=g;
  qs=shuffle(QB[langKey][g.id]).slice(0,10);
  cur=0; score=0; answered=false;
  goTo('s-quiz');
  renderQ();
}

function renderQ(){
  var L=T[langKey];
  var q=qs[cur];
  answered=false;
  document.getElementById('q-badge').textContent=genre.icon+' '+genre.name;
  document.getElementById('q-badge').style.background=genre.bg;
  document.getElementById('q-badge').style.color=genre.col;
  document.getElementById('q-score').textContent=L.score+': '+score;
  document.getElementById('q-bar').style.width=(cur/qs.length*100)+'%';
  document.getElementById('q-num').textContent=L.q+' '+(cur+1)+' '+L.of+' '+qs.length;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-exp').textContent='';
  var nxt=document.getElementById('q-next');
  nxt.className='btn hidden';
  var opts=document.getElementById('q-opts');
  opts.innerHTML='';
  q.o.forEach(function(o,i){
    var b=document.createElement('button');
    b.className='opt';
    b.textContent=o;
    b.onclick=(function(idx){return function(){pick(idx);};})(i);
    opts.appendChild(b);
  });
}

function pick(i){
  if(answered)return;
  answered=true;
  var L=T[langKey];
  var q=qs[cur];
  var btns=document.getElementById('q-opts').querySelectorAll('.opt');
  btns.forEach(function(b){b.disabled=true;});
  btns[i].className='opt '+(i===q.a?'correct':'wrong');
  if(i!==q.a) btns[q.a].className='opt correct';
  if(i===q.a) score++;
  document.getElementById('q-exp').textContent=q.e;
  var nxt=document.getElementById('q-next');
  nxt.className='btn';
  nxt.textContent=cur<qs.length-1?L.next:L.results;
}

function nextQ(){
  cur++;
  if(cur>=qs.length){showResult();}
  else{renderQ();}
}

function showResult(){
  var L=T[langKey];
  var pct=Math.round(score/qs.length*100);
  document.getElementById('r-badge').textContent=genre.icon+' '+genre.name;
  document.getElementById('r-badge').style.background=genre.bg;
  document.getElementById('r-badge').style.color=genre.col;
  document.getElementById('r-score').textContent=score+'/'+qs.length;
  document.getElementById('r-msg').textContent=pct+'% — '+L.msg(pct);
  document.getElementById('r-again').textContent=L.again;
  document.getElementById('r-genre').textContent=L.chGenre;
  document.getElementById('r-lang').textContent=L.chLang;
  goTo('s-result');
}

function playAgain(){startQuiz(genre);}
function goGenre(){goTo('s-genre');}
